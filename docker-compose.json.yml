# 轻量部署：无 PostgreSQL，元数据存 JSON 文件
# 用法：docker compose -f docker-compose.json.yml up -d

name: protohost

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      STORAGE_DRIVER: json
      JSON_STORE_PATH: /app/data
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800}
      JWT_VIEW_EXPIRATION: ${JWT_VIEW_EXPIRATION:-7200}
      UPLOAD_BASE_PATH: /app/uploads
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
      DEFAULT_USER_ENABLED: ${DEFAULT_USER_ENABLED:-true}
      DEFAULT_USER_EMAIL: ${DEFAULT_USER_EMAIL:-admin}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-Admin1234}
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - json_data:/app/data
      - uploads_server:/app/uploads
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - server

volumes:
  json_data:
  uploads_server:
