# 本地开发基础设施：仅 PostgreSQL
# 用法：docker compose -f docker-compose.infra.yml up -d
# 或：pnpm infra:up

name: protohost

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: protohost
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: protohost
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protohost -d protohost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
